<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            background: #f5f7fa;
            overflow: hidden;
        }
        
        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .sidebar-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .new-chat-btn {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .chat-list {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        
        .chat-item {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .chat-item.active {
            background: #e8f0fe;
            border-left: 3px solid #1a73e8;
        }
        
        .chat-icon {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e8f0fe;
            border-radius: 50%;
            color: #1a73e8;
            font-size: 14px;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-title {
            font-size: 14px;
            font-weight: 500;
            color: #333;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
        }
        
        .header-bar {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }
        
        .app-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a73e8;
        }
        
        .chat-area {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }
        
        .input-container {
            flex: 1;
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border-radius: 24px;
            padding: 8px 16px;
        }
        
        .input-container input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 16px;
            padding: 4px 0;
        }
        
        .send-button {
            width: 48px;
            height: 48px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        /* 消息样式 - 用户消息在右边，AI消息在左边 */
        .message {
            max-width: 80%;
            padding: 16px 20px;
            border-radius: 16px;
            line-height: 1.5;
            position: relative;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
            word-wrap: break-word;
            font-size: 16px;
        }
        
        .user-message {
            align-self: flex-end;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .ai-message {
            align-self: flex-start;
            background: #f8f9fa;
            color: #333;
            border-bottom-left-radius: 4px;
            border: 1px solid #e0e0e0;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }}
        
    </style>
</head>
<body>
    <!-- 左侧聊天记录面板 -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title">聊天记录</div>
            <button class="new-chat-btn" id="newChatBtn">
                <span>+</span> 新对话
            </button>
        </div>
        
        <div class="chat-list" id="chatList">
            <div class="chat-item active" data-memory-id="295530">
                <div class="chat-icon">💬</div>
                <div class="chat-info">
                    <div class="chat-title">对话 295530</div>
                </div>
            </div>
            <div class="chat-item" data-memory-id="252365">
                <div class="chat-icon">💬</div>
                <div class="chat-info">
                    <div class="chat-title">对话 252365</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 右侧聊天区域 -->
    <div class="main-content">
        <div class="header-bar">
            <div class="app-title">AI Hub</div>
        </div>
        
        <div class="chat-area" id="chatContainer">
            <div class="welcome-message" style="text-align:center;color:#666;padding:30px;font-size:16px;">
                输入消息，可上传图片、音频或视频...
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="输入消息，可上传图片、音频或视频..." autocomplete="off">
                <button id="fileUploadBtn" style="background:none;border:none;color:#666;width:24px;height:24px;display:flex;align-items:center;justify-content:center;">
                    📎
                </button>
            </div>
            <button class="send-button" id="sendButton">➤</button>
        </div>
    </div>

    <script src="js/history.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
